    <script>
        var playerId = 0;
        var players = ["red", "lime"];
        var currPos = "A7";
        var col = "ABCDEFGH";
        updateBoard();
        function buttonclick(btnId) {
            if (parseInt(col.indexOf(btnId[0])) - 4 <= col.indexOf(currPos[0]) && col.indexOf(btnId[0]) > col.indexOf(currPos[0]) && btnId[1] == currPos[1]) {
                currPos = btnId;
                nextplayer(btnId);
            }
            else if (parseInt(btnId[1]) + 3 >= currPos[1] && parseInt(btnId[1]) < currPos[1] && btnId[0] == currPos[0]) {
                currPos = btnId;
                nextplayer(btnId);
            }
            else {
                alert("Your move is invalid\nYou can move right maximum 4 cells or down maximum 3 cells");
            }
        }
        function nextplayer(p) {
            if (p == "H0") {
                switch (playerId % 2) {
                    case 0:
                        alert(players[1] + " won the game");
                        break;
                    case 1:
                        alert(players[0] + " won the game");
                        break;
                }
                location.reload();
            }
            playerId++;
            updateBoard();
        }
        function updateBoard() {
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    document.getElementById(col[i] + j).style.color = "transparent";
                }
            }
            document.getElementById(currPos).style.color = players[playerId % 2 == 0 ? 1 : 0];
            document.getElementById("npId").style.color = players[playerId % 2];
        }
    </script>
